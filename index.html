function loadSheetPayloadJsonp(url){
  return new Promise((resolve,reject)=>{
    if(!url || !/^https?:\/\//.test(String(url).trim())){resolve(null);return;}
    const cb='axeCookSheetCallback_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    const sep=url.includes('?')?'&':'?';
    const script=document.createElement('script');
    let settled=false;
    const finish=(ok,value)=>{
      if(settled)return;
      settled=true;
      clearTimeout(timer);
      if(script && script.parentNode) script.parentNode.removeChild(script);
      // 늦게 도착한 JSONP 응답이 콜백을 호출해도 콘솔 오류가 나지 않도록 잠시 no-op으로 남겨둠
      setTimeout(()=>{try{delete window[cb];}catch(e){window[cb]=undefined;}},30000);
      ok ? resolve(value) : reject(value);
    };
    const timer=setTimeout(()=>{
      // 타임아웃 뒤에 응답이 도착해도 ReferenceError가 나지 않도록 콜백은 유지
      window[cb]=function(){ /* late JSONP response ignored */ };
      finish(false,new Error('시트 데이터 로딩 시간이 초과되었습니다.'));
    },9000);
    window[cb]=(payload)=>finish(true,payload);
    script.onerror=()=>finish(false,new Error('Apps Script 연결에 실패했습니다.'));
    script.src=url+sep+'action=getData&callback='+encodeURIComponent(cb)+'&t='+Date.now();
    document.head.appendChild(script);
  });
}

function extractSheetRawPayload(payload){
  if(!payload) return null;
  if(payload.raw) return payload.raw;
  if(payload.data && payload.data.raw) return payload.data.raw;
  if(payload.sheetData && payload.sheetData.raw) return payload.sheetData.raw;
  return null;
}

async function loadSheetRawBeforeBoot(){
  const url=String(AXE_COOK_SHEET_API_URL||'').trim();
  if(!url || url.includes('PASTE') || url.includes('YOUR_')){
    AXE_COOK_DATA_SOURCE='local';
    return;
  }
  try{
    const payload=await loadSheetPayloadJsonp(url);
    const rawPayload=extractSheetRawPayload(payload);
    if(payload && payload.ok && rawPayload){
      RAW=Object.assign({}, RAW, rawPayload);
      AXE_COOK_DATA_SOURCE='sheet';
      AXE_COOK_SHEET_META=payload.meta || payload.sheetData || payload.dataMeta || null;
    }else{
      AXE_COOK_DATA_SOURCE='local-fallback';
      AXE_COOK_SHEET_META=(payload && (payload.meta || payload.sheetData)) || null;
      console.warn('[AXE COOK] Sheet payload has no usable raw data. Local fallback used.', payload);
      if(payload && payload.error) toast('시트 데이터 오류: '+payload.error);
      else toast('시트 응답 형식 확인 필요: 로컬 데이터로 실행');
    }
  }catch(err){
    AXE_COOK_DATA_SOURCE='local-fallback';
    console.warn('[AXE COOK] Sheet load failed', err);
    toast('시트 연결 실패: 로컬 데이터로 실행');
  }
}

function parseTSV(text){const lines=String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/).filter(x=>x.trim().length);if(!lines.length)return[];const head=lines.shift().split('\t').map(x=>x.trim().replace(/^\uFEFF/,''));return lines.map(line=>{const cols=line.split('\t');const obj={};head.forEach((h,i)=>obj[h]=(cols[i]??'').trim());return obj;});}
function isTrue(v){return !['FALSE','false','0','N','n','미사용'].includes(String(v||'').trim());}
function num(v,d=0){const n=Number(String(v??'').replace(/,/g,'').trim());return Number.isFinite(n)?n:d;}
function text(v){return String(v??'').trim();}
function h(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.__toastT);window.__toastT=setTimeout(()=>el.classList.remove('show'),1400);}
function initDB(){const foods=parseTSV(RAW.foods).filter(r=>isTrue(r['사용여부']));const recipes=parseTSV(RAW.recipes).filter(r=>isTrue(r['사용여부']));const materials=parseTSV(RAW.materials).filter(r=>isTrue(r['사용여부']));const processes=parseTSV(RAW.processes).filter(r=>isTrue(r['사용여부']));const farm=parseTSV(RAW.farm).filter(r=>isTrue(r['사용여부']));const aliases=parseTSV(RAW.aliases).filter(r=>isTrue(r['사용여부']));const fish=parseTSV(RAW.fish).filter(r=>isTrue(r['사용여부']));const aliasMap=new Map();aliases.forEach(r=>{if(text(r['입력명'])&&text(r['표준명']))aliasMap.set(text(r['입력명']),text(r['표준명']));});DB={foods,recipes,materials,processes,farm,aliases,fish,aliasMap};}
function stdName(name){let n=text(name);return DB.aliasMap.get(n)||n;}
function getFood(name){return DB.foods.find(f=>text(f['요리명'])===name);}
function getSetQty(food){return Math.max(1,num(food?.['1세트수량'],1));}
function getSale(food){return num(food?.['세트판매가'],0);}
function getCookTime(food){const raw=text(food?.['조리시간']||food?.['중간수치']||'');if(!raw||raw==='미확인')return '미확인';if(/[초분]/.test(raw))return raw;return raw+'초';}
function getFoodRecipes(name){return DB.recipes.filter(r=>text(r['요리명'])===name && text(r['재료명']));}
function materialByName(name){const n=stdName(name);return DB.materials.find(m=>text(m['재료명'])===n);}
function isFarm(name){const n=stdName(name);return DB.farm.some(f=>text(f['재료명'])===n);}
function processRows(name){const n=stdName(name);return DB.processes.filter(p=>text(p['가공재료명'])===n && text(p['하위재료명']));}
function addQty(map,name,qty){if(!name||!qty)return;const n=stdName(name);map.set(n,(map.get(n)||0)+qty);}
function loadState(){try{orders=JSON.parse(localStorage.getItem(STORE_ORDERS)||'[]');}catch(e){orders=[]}try{favorites=JSON.parse(localStorage.getItem(STORE_FAVS)||'[]');}catch(e){favorites=[]}try{checks=JSON.parse(localStorage.getItem(STORE_CHECKS)||'{}');}catch(e){checks={}}}
function saveState(){localStorage.setItem(STORE_ORDERS,JSON.stringify(orders));localStorage.setItem(STORE_FAVS,JSON.stringify(favorites));localStorage.setItem(STORE_CHECKS,JSON.stringify(checks));}
function addOrder(name,sets=1){const food=getFood(name);if(!food)return toast('요리를 찾을 수 없습니다.');sets=Math.max(1,Math.floor(num(sets,1)));localStorage.removeItem(STORE_EMPTY);const old=orders.find(o=>o.name===name);if(old){old.sets+=sets;}else{orders=[{name,sets}];checks={};localStorage.setItem(STORE_CHECKS,JSON.stringify({}));}saveState();render();toast(`${name} ${sets}세트 작업 시작`);}
function removeOrder(name){orders=orders.filter(o=>o.name!==name);saveState();render();}
function askResetConfirm(){
  return new Promise(resolve=>{
    const overlay=document.getElementById('confirmResetOverlay');
    const yes=document.getElementById('resetYesBtn');
    const no=document.getElementById('resetNoBtn');
    if(!overlay||!yes||!no){resolve(confirm('작업공간을 초기화 하겠습니까?'));return;}
    const close=(v)=>{overlay.classList.remove('show');overlay.setAttribute('aria-hidden','true');yes.onclick=null;no.onclick=null;overlay.onclick=null;document.removeEventListener('keydown',onKey);resolve(v);};
    const onKey=(e)=>{if(e.key==='Escape')close(false);};
    yes.onclick=()=>close(true);
    no.onclick=()=>close(false);
    overlay.onclick=(e)=>{if(e.target===overlay)close(false);};
    document.addEventListener('keydown',onKey);
    overlay.classList.add('show');
    overlay.setAttribute('aria-hidden','false');
    no.focus();
  });
}
async function resetWorkspace(){
  const ok=await askResetConfirm();
  if(!ok)return;
  orders=[];
  checks={};
  localStorage.setItem(STORE_ORDERS,JSON.stringify([]));
  localStorage.setItem(STORE_CHECKS,JSON.stringify({}));
  localStorage.setItem(STORE_EMPTY,'true');
  render();
  toast('작업공간을 초기화했습니다');
}

function updateSets(name,val){const o=orders.find(x=>x.name===name);if(o){o.sets=Math.max(1,Math.floor(num(val,1)));saveState();renderResultsOnly();renderOrders();}}
function toggleFavorite(name){if(favorites.includes(name))favorites=favorites.filter(x=>x!==name);else favorites.unshift(name);favorites=favorites.slice(0,24);saveState();renderFavorites();renderSearch();}
function calc(){const base=new Map(), detail=[];let totalSets=0,totalActual=0,totalSale=0;orders.forEach(o=>{const food=getFood(o.name);if(!food)return;const setQty=getSetQty(food);const actual=o.sets*setQty;totalSets+=o.sets;totalActual+=actual;totalSale+=o.sets*getSale(food);getFoodRecipes(o.name).forEach(r=>{const need=num(r['필요수량'],0)*actual;if(need>0){addQty(base,r['재료명'],need);detail.push({food:o.name, material:stdName(r['재료명']), qty:need});}});});const final=new Map(), farm=new Map(), unknown=new Map(), proc=[];function resolve(name,qty,depth=0){const n=stdName(name);if(depth>8){addQty(unknown,n,qty);return;}const rows=processRows(n);if(rows.length){const out=PROCESS_OUTPUT[n]||1;const batch=Math.ceil(qty/out);proc.push({name:n, need:qty, batch, output:out, rows});rows.forEach(r=>{const child=text(r['하위재료명']);const childQty=num(r['필요수량'],0);if(child&&childQty>0)resolve(child,childQty*batch,depth+1);else addQty(unknown,child||n,qty);});return;}if(isFarm(n)){addQty(farm,n,qty);return;}if(materialByName(n)){addQty(final,n,qty);return;}addQty(unknown,n,qty);}
base.forEach((q,n)=>resolve(n,q));const purchases=[];let totalCost=0;final.forEach((qty,name)=>{const m=materialByName(name)||{};const bundleQty=Math.max(1,num(m['묶음수량'],1));const bundlePrice=num(m['묶음가격'],num(m['개당가격'],0)*bundleQty);const bundles=Math.ceil(qty/bundleQty);const cost=bundles*bundlePrice;totalCost+=cost;purchases.push({name,qty,bundleQty,bundlePrice,bundles,cost,where:text(m['구매처'])||'구매'});});purchases.sort((a,b)=>a.where.localeCompare(b.where,'ko')||a.name.localeCompare(b.name,'ko'));const farmRows=[...farm.entries()].map(([name,qty])=>({name,qty})).sort((a,b)=>a.name.localeCompare(b.name,'ko'));const unknownRows=[...unknown.entries()].map(([name,qty])=>({name,qty}));const fishNeed=[...base.entries()].filter(([n])=>n.includes('분홍살생선')||n.includes('흰살생선')).map(([name,qty])=>({name,qty, options:DB.fish.filter(f=>text(f['결과재료'])===name).slice(0,5)}));return {totalSets,totalActual,totalSale,totalCost,profit:totalSale-totalCost,purchases,farmRows,unknownRows,proc,detail,fishNeed};}
function invText(sets){const lines=Math.floor(sets/8), rest=sets%8;return lines?`${lines}줄${rest?` ${rest}세트`:''}`:`${rest}세트`;}
function safeJsArg(s){return h(String(s)).replace(/\\/g,'\\\\').replace(/'/g,'&#39;');}
function renderSearch(){const input=document.getElementById('foodSearch');const q=text(input?.value).trim().toLowerCase();const box=document.getElementById('searchResults');if(!box)return;if(!q){box.classList.add('is-idle');box.innerHTML='<div class="search-idle">요리명을 입력하면 결과가 표시됩니다.<br>자주 쓰는 음식은 아래 빠른 추가에서 바로 넣으세요.</div>';return;}box.classList.remove('is-idle');const list=DB.foods.filter(f=>text(f['요리명']).toLowerCase().includes(q)).slice(0,8);if(!list.length){box.innerHTML='<div class="empty">검색 결과가 없습니다.</div>';return;}box.innerHTML=list.map(f=>{const name=text(f['요리명']);const fav=favorites.includes(name);return `<div class="search-item"><div><div class="search-name">${h(name)} ${fav?'★':''}</div><div class="search-meta">${h(text(f['등급'])||'등급 미확인')} · 1세트 ${getSetQty(f)}개 · ${h(getCookTime(f))}</div></div><div style="display:grid;gap:4px"><button class="btn primary" data-add="${h(name)}">추가</button><button class="btn ghost" data-fav="${h(name)}">${fav?'해제':'★'}</button></div></div>`;}).join('');box.querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',()=>addOrder(b.dataset.add,document.getElementById('setCount').value)));box.querySelectorAll('[data-fav]').forEach(b=>b.addEventListener('click',()=>toggleFavorite(b.dataset.fav)));}
function renderFavorites(){const box=document.getElementById('favStrip');const valid=favorites.filter(getFood);if(!valid.length){box.innerHTML='<span class="pill">즐겨찾기가 없습니다</span>';return;}box.innerHTML=valid.map(n=>`<button class="fav" data-add="${h(n)}">${h(n)} +1</button>`).join('');box.querySelectorAll('[data-add]').forEach(b=>b.addEventListener('click',()=>addOrder(b.dataset.add,1)));}
function renderOrders(){document.getElementById('orderCount').textContent=`${orders.length}개`;const box=document.getElementById('orderList');if(!orders.length){box.innerHTML='<div class="empty">만들 음식을 추가하세요.</div>';return;}box.innerHTML=orders.map(o=>{const f=getFood(o.name);const setQty=getSetQty(f);return `<div class="order-row"><div><div class="order-name">${h(o.name)}</div><div class="order-sub">1세트 ${setQty}개 · 실제 ${o.sets*setQty}개 · 판매가 ${(o.sets*getSale(f)).toLocaleString()}원</div></div><input class="num" type="number" min="1" value="${o.sets}" data-set="${h(o.name)}"><button class="btn bad" data-del="${h(o.name)}">삭제</button></div>`;}).join('');box.querySelectorAll('[data-set]').forEach(i=>i.addEventListener('change',()=>updateSets(i.dataset.set,i.value)));box.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>removeOrder(b.dataset.del)));}
function checkKey(name){return 'mat:'+name;}
function renderResultsOnly(){
const r=calc();
document.getElementById('summaryGrid').innerHTML=`<div class="summary primary"><div class="summary-label">총 세트</div><div class="summary-value gold">${r.totalSets}</div></div><div class="summary"><div class="summary-label">인벤 예상</div><div class="summary-value">${invText(r.totalSets)}</div></div><div class="summary"><div class="summary-label">구매 원가</div><div class="summary-value ok">${r.totalCost.toLocaleString()}</div></div><div class="summary"><div class="summary-label">예상 수익</div><div class="summary-value ${r.profit>=0?'gold':'bad'}">${r.profit.toLocaleString()}</div></div>`;
document.getElementById('warningBox').innerHTML=r.unknownRows.length?`<div class="warning">가격 또는 획득처가 없는 재료: ${r.unknownRows.map(x=>`${h(x.name)} ${x.qty}개`).join(', ')}</div>`:'';
const purchase=document.getElementById('purchaseList');
const rows=[...r.purchases.map(p=>({...p,type:'buy'})),...r.farmRows.map(x=>({name:x.name,qty:x.qty,bundleQty:0,bundlePrice:0,bundles:'채집',cost:0,where:'농장',type:'farm'}))];
if(!rows.length)purchase.innerHTML='<div class="empty">구매·채집할 재료가 없습니다.</div>';
else purchase.innerHTML=rows.map(p=>{const key=checkKey(p.type+'_'+p.name);const done=checks[key];const isFarm=p.type==='farm';const remain=(!isFarm)?Math.max(0,(p.bundles*p.bundleQty)-p.qty):0;const sub=isFarm?`채집 · 필요 ${p.qty}개`:`${h(p.where)} · 필요 ${p.qty}개 · 구매 ${p.bundles*p.bundleQty}개 · ${remain}개 남음`;return `<label class="check-row ${done?'done':''} ${isFarm?'farm-row':''}"><input type="checkbox" ${done?'checked':''} data-check="${h(key)}"><div><div class="check-name">${h(p.name)}${isFarm?'<span class="mini-badge farm-badge">농장</span>':''}</div><div class="check-sub">${sub}</div></div><div class="check-right"><span class="check-bundle ${isFarm?'farm-pack':''}">${isFarm?'채집':p.bundles+'묶음'}</span>${isFarm?'':`<span class="check-cost">${p.cost.toLocaleString()}원</span>`}</div></label>`;}).join('');
purchase.querySelectorAll('[data-check]').forEach(i=>i.addEventListener('change',()=>{checks[i.dataset.check]=i.checked;saveState();i.closest('.check-row').classList.toggle('done',i.checked)}));
const recipePanel=document.querySelector('.recipe-work-panel');
if(recipePanel){recipePanel.classList.toggle('has-process-v30',r.proc.length>0);recipePanel.classList.toggle('no-process-v30',!r.proc.length);}
const procInline=document.getElementById('processInline');
if(procInline){procInline.innerHTML=r.proc.length?`<div class="process-side-card-v30"><div class="process-side-title-v30"><span>가공 준비</span><small>${r.proc.length}개</small></div><div class="process-side-list-v30">${r.proc.map(p=>`<div class="process-side-row-v30"><div><b>${h(p.name)}</b><small>필요 ${p.need}개 · 결과 ${p.output}개/회</small></div><span class="process-side-batch-v30">${p.batch}회</span></div>`).join('')}</div></div>`:'';}
document.getElementById('farmCount')&&(document.getElementById('farmCount').textContent=r.farmRows.length);
document.getElementById('processCount')&&(document.getElementById('processCount').textContent=r.proc.length);
document.getElementById('fishCount')&&(document.getElementById('fishCount').textContent=r.fishNeed.length);
document.getElementById('farmList')&&(document.getElementById('farmList').innerHTML=r.farmRows.length?r.farmRows.map(x=>`<div class="mini-row"><span>${h(x.name)}</span><strong>${x.qty}개</strong></div>`).join(''):'<div class="empty">농장 채집 없음</div>');
document.getElementById('processList')&&(document.getElementById('processList').innerHTML=r.proc.length?r.proc.map(p=>`<div class="mini-row"><span>${h(p.name)}<br><small style="color:var(--muted)">필요 ${p.need}개 · 결과 ${p.output}개/회</small></span><strong>${p.batch}회</strong></div>`).join(''):'<div class="empty">가공 필요 없음</div>');
document.getElementById('fishList')&&(document.getElementById('fishList').innerHTML=r.fishNeed.length?r.fishNeed.map(f=>`<div class="mini-row"><span>${h(f.name)} ${f.qty}개<br><small style="color:var(--muted)">${f.options.map(o=>h(text(o['생선명']))+' '+h(text(o['투입수량']))+'마리').join(' / ')||'변환 데이터 없음'}</small></span></div>`).join(''):'<div class="empty">생선살 필요 없음</div>');
renderWorkRecipes();
}
function renderWorkRecipes(){const box=document.getElementById('recipeWorkList');if(!box)return;if(!orders.length){box.innerHTML='<div class="empty">음식을 추가하면 기본 레시피와 조리시간이 표시됩니다.</div>';return;}box.innerHTML=orders.map(o=>{const f=getFood(o.name);if(!f)return '';const rows=getFoodRecipes(o.name);const matText=rows.length?rows.map(r=>`<span class="recipe-v13-mat"><span>${h(r['재료명'])}</span> <b>${num(r['필요수량'],0)}</b></span>`).join('<span class="recipe-v13-dot">·</span>'):'<span class="recipe-v13-empty">레시피 미등록</span>';const plain=rows.length?rows.map(r=>`${text(r['재료명'])} ${num(r['필요수량'],0)}`).join(' · '):'레시피 미등록';return `<div class="recipe-work-card recipe-v13-card"><div class="recipe-v13-head"><span class="recipe-v13-bracket">[</span><span class="recipe-v13-name">${h(o.name)}</span><span class="recipe-v13-sep">/</span><span class="recipe-v13-time">${h(getCookTime(f))}</span><span class="recipe-v13-bracket">]</span></div><div class="recipe-v13-mats" title="${h(plain)}">${matText}</div></div>`;}).join('');}
function recipeRowsByFood(name){return DB.recipes.filter(r=>text(r['요리명'])===text(name));}
function renderRecipeCard(name){const card=document.getElementById('recipeCard');if(!card)return;const f=getFood(name);const rows=recipeRowsByFood(name);if(!f){card.innerHTML='<div class="empty">요리를 선택하세요.</div>';return;}card.innerHTML=`<div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start"><div><div style="font-size:18px;font-weight:1000;color:var(--gold2)">${h(name)}</div><div class="chip-row"><span class="chip">${h(text(f['등급'])||'등급 미확인')}</span><span class="chip">1세트 ${getSetQty(f)}개</span><span class="chip">판매가 ${getSale(f).toLocaleString()}원</span></div></div><button class="btn primary" data-recipe-add="${h(name)}">추가</button></div><div style="margin-top:12px" class="mini-list">${rows.length?rows.map(r=>`<div class="mini-row"><span>${h(r['재료명'])}</span><strong>${h(r['필요수량'])}</strong></div>`).join(''):'<div class="empty">등록된 레시피가 없습니다.</div>'}</div><div style="margin-top:10px;color:var(--muted);font-size:12px;font-weight:850;line-height:1.5">효과: ${h(text(f['효과'])||'미확인')} · 지속시간: ${h(text(f['지속시간'])||'미확인')}</div>`;card.querySelector('[data-recipe-add]')?.addEventListener('click',e=>addOrder(e.currentTarget.dataset.recipeAdd,document.getElementById('setCount').value));}
function renderDataView(){const box=document.getElementById('dataView');if(!box)return;let rows=[];if(activeTab==='foods'){rows=DB.foods.slice(0,100);box.innerHTML=`<table><thead><tr><th>요리명</th><th>등급</th><th>1세트</th><th>판매가</th><th>효과</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${h(r['요리명'])}</td><td>${h(r['등급'])}</td><td>${getSetQty(r)}</td><td>${getSale(r).toLocaleString()}</td><td>${h(r['효과'])}</td></tr>`).join('')}</tbody></table>`;}else if(activeTab==='materials'){rows=DB.materials;box.innerHTML=`<table><thead><tr><th>재료</th><th>구매처</th><th>묶음</th><th>가격</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${h(r['재료명'])}</td><td>${h(r['구매처'])}</td><td>${h(r['묶음수량'])}</td><td>${h(r['묶음가격'])}</td></tr>`).join('')}</tbody></table>`;}else if(activeTab==='processes'){rows=DB.processes;box.innerHTML=`<table><thead><tr><th>가공재료</th><th>하위재료</th><th>필요</th><th>결과</th><th>시간</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${h(r['가공재료명'])}</td><td>${h(r['하위재료명'])}</td><td>${h(r['필요수량'])}</td><td>${h(r['결과수량']||'')}</td><td>${h(r['가공시간'])}</td></tr>`).join('')}</tbody></table>`;}else{const foodNames=[...new Set(DB.recipes.map(r=>text(r['요리명'])).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ko'));const first=foodNames[0]||'';box.innerHTML=`<div class="recipe-browser"><div class="recipe-list">${foodNames.map((n,i)=>`<button class="recipe-pick ${i===0?'active':''}" data-recipe-food="${h(n)}">${h(n)}</button>`).join('')}</div><div id="recipeCard" class="recipe-card"></div></div>`;box.querySelectorAll('[data-recipe-food]').forEach(b=>b.addEventListener('click',()=>{box.querySelectorAll('.recipe-pick').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderRecipeCard(b.dataset.recipeFood);}));renderRecipeCard(first);}}

  };
  renderSearch = function(){
    const input=document.getElementById('foodSearch');

    const box=document.getElementById('searchResults');
    if(!box)return;
    if(!q){box.classList.add('is-idle','is-closed');box.innerHTML='';return;}

  };

<script id="axeCookV34RecipePurchaseBalanceScript">
(function(){
  function normalizeSourceV34(v){
    const s=text(v==null?'':v).trim();
    if(!s) return '구매';
    if(s==='고정단가') return '기타';
    return s;
  }
  function renderPurchaseListV34(){
    const purchase=document.getElementById('purchaseList');
    if(!purchase) return;
    const r=calc();
    const rows=[...r.purchases.map(p=>({...p,type:'buy'})),...r.farmRows.map(x=>({name:x.name,qty:x.qty,bundleQty:0,bundlePrice:0,bundles:'채집',cost:0,where:'농장',type:'farm'}))];
    if(!rows.length){
      purchase.innerHTML='<div class="empty">필요한 구매 재료가 없습니다.</div>';
      return;
    }
    purchase.innerHTML=rows.map(p=>{
      const key=checkKey(p.type+'_'+p.name);
      const done=checks[key];
      const isFarm=p.type==='farm';
      const need=Math.ceil(num(p.qty,0));
      const buyQty=(!isFarm)?Math.ceil(num(p.bundles,0)*num(p.bundleQty,0)):0;
      const remain=(!isFarm)?Math.max(0,buyQty-need):0;
      const src=normalizeSourceV34(p.where);
      const sub=isFarm?`농장 · 필요 ${need}개 · 채집`:`${h(src)} · 필요 ${need}개 · 구매 ${buyQty}개 · ${remain}개 남음`;
      return `<label class="check-row ${done?'done':''} ${isFarm?'farm-row':''}"><input type="checkbox" ${done?'checked':''} data-check="${h(key)}"><div><div class="check-name">${h(p.name)}${isFarm?'<span class="mini-badge farm-badge">농장</span>':''}</div><div class="check-sub">${sub}</div></div><div class="check-right"><span class="check-bundle ${isFarm?'farm-pack':''}">${isFarm?'채집':p.bundles+'묶음'}</span>${isFarm?'':`<span class="check-cost">${num(p.cost,0).toLocaleString()}원</span>`}</div></label>`;
    }).join('');
    purchase.querySelectorAll('[data-check]').forEach(i=>i.addEventListener('change',()=>{checks[i.dataset.check]=i.checked;saveState();i.closest('.check-row').classList.toggle('done',i.checked)}));
  }
  function markRecipePanelV34(){
    const panel=document.querySelector('.recipe-work-panel');
    if(!panel) return;
    let r=null; try{r=calc();}catch(e){}
    const has=!!(r&&r.proc&&r.proc.length);
    panel.classList.toggle('has-process-v34',has);
    panel.classList.toggle('no-process-v34',!has);
  }
  const prevRenderResultsOnly=renderResultsOnly;
  renderResultsOnly=function(){
    const out=prevRenderResultsOnly.apply(this,arguments);
    try{renderPurchaseListV34();markRecipePanelV34();}catch(e){console.warn('[AXE COOK v34] balance failed',e);}
    return out;
  };
  const prevRenderWorkRecipes=renderWorkRecipes;
  renderWorkRecipes=function(){
    const out=prevRenderWorkRecipes.apply(this,arguments);
    try{markRecipePanelV34();}catch(e){}
    return out;
  };
  const oldDebug=window.axeCookV33Debug||window.axeCookV32Debug;
  window.axeCookV34Debug=function(){
    let r=null;try{r=calc();}catch(e){}
    return {version:'v35',focus:'recipe-process-card-line-balance-and-purchase-one-line-price',purchase:'bundle-and-cost-one-line, source-needed-buy-remain text',recipe:'matched card line and compact process cards',dataSource:AXE_COOK_DATA_SOURCE,processCount:r&&r.proc?r.proc.length:null,previousDebug:oldDebug?oldDebug():null};
  };
})();
</script>

<script id="axeCookV39RecipeSettingsFixScript">
(function(){
  const VERSION_V39='AXE_COOK_v39_RECIPE_GROUP_SETTINGS_NO_GAS_CHANGE';
  const titleMap={foods:'요리',materials:'재료',recipes:'레시피',processes:'가공',farm:'농장재료',aliases:'별칭',fish:'생선변환'};
  const idMap={foods:'food_id',materials:'material_id',recipes:'recipe_id',processes:'process_id',farm:'farm_id',aliases:'alias_name',fish:'fish_id'};
  const rowsMap={foods:()=>DB.foods,materials:()=>DB.materials,recipes:()=>DB.recipes,processes:()=>DB.processes,farm:()=>DB.farm,aliases:()=>DB.aliases,fish:()=>DB.fish};
  let recipeMode='new', recipeOldFood='', recipeRows=[], expandedFood='';
  let busy=false;
  const oldToast=window.toast||toast;
  window.toast=function(msg){
    if(String(msg||'')==='수정중 상태로 불러왔습니다') return;
    oldToast.apply(this,arguments);
  };
  function activeKind(){return document.querySelector('#settingsTabs .tab.active')?.dataset.manage||'foods';}
  function setBusy(v,msg){busy=!!v;document.querySelector('.settings-page-panel')?.classList.toggle('settings-busy-v39',busy);if(msg)toast(msg);}
  function maxSort(kind){let max=0;(rowsMap[kind]?.()||[]).forEach(r=>{const n=Number(String(r['정렬']||'').replace(/,/g,'').trim());if(Number.isFinite(n))max=Math.max(max,n);});return max;}
  function currentIdExists(kind){const idField=idMap[kind];const el=document.querySelector('#settingsForm [data-field="'+idField+'"]');if(!el)return false;const id=String(el.value||'').trim();if(!id)return false;return (rowsMap[kind]?.()||[]).some(r=>String(r['id']||r['입력명']||'').trim()===id);}
  function nextRecipeId(n){let max=0;(DB.recipes||[]).forEach(r=>{const m=String(r['id']||'').match(/(\d+)$/);if(m)max=Math.max(max,Number(m[1]));});return 'recipe_'+String(max+n).padStart(4,'0');}
  function apiJsonp(action,params){const url=String(AXE_COOK_SHEET_API_URL||'').trim();if(!url||!/^https?:\/\//.test(url))return Promise.reject(new Error('Apps Script URL이 없습니다.'));return new Promise((resolve,reject)=>{const cb='axeCookV39Cb_'+Date.now()+'_'+Math.random().toString(36).slice(2);const script=document.createElement('script');const query=new URLSearchParams(Object.assign({},params,{action,callback:cb,t:Date.now()}));const sep=url.includes('?')?'&':'?';const timer=setTimeout(()=>{cleanup();reject(new Error('요청 시간이 초과되었습니다.'));},15000);function cleanup(){clearTimeout(timer);try{delete window[cb];}catch(e){window[cb]=undefined;}if(script.parentNode)script.parentNode.removeChild(script);}window[cb]=payload=>{cleanup();resolve(payload);};script.onerror=()=>{cleanup();reject(new Error('Apps Script 연결 실패'));};script.src=url+sep+query.toString();document.head.appendChild(script);});}
  async function reloadAll(msg){setBusy(true,msg||'새로고침 중');await loadSheetRawBeforeBoot();initDB();render();setTimeout(()=>{normalizeCommon();if(activeKind()==='recipes')renderRecipeSettings();setBusy(false);},20);}
  function normalizeCommon(){
    const kind=activeKind();
    const title=document.getElementById('settingsEditorTitle');
    const newBtn=document.getElementById('settingsNewBtn');
    if(title)title.textContent=titleMap[kind]||'설정';
    if(newBtn)newBtn.textContent='추가';
    const sort=document.querySelector('#settingsForm [data-field="sort_order"]');
    if(sort&&!String(sort.value||'').trim()&&!currentIdExists(kind)) sort.value=String(maxSort(kind)+1);
  }
  function groupRecipes(){
    const map=new Map();
    (DB.recipes||[]).forEach(r=>{const name=String(r['요리명']||'').trim();if(!name)return;if(!map.has(name))map.set(name,[]);map.get(name).push(r);});
    return [...map.entries()].sort((a,b)=>a[0].localeCompare(b[0],'ko')).map(([food,rows])=>({food,rows:rows.slice().sort((x,y)=>(Number(x['정렬']||0)-Number(y['정렬']||0)))}));
  }
  function setEditorState(mode,dirty){const ed=document.querySelector('.setting-editor-v36');if(!ed)return;ed.classList.toggle('is-editing',mode==='edit');ed.classList.toggle('is-dirty',!!dirty);}
  function blankRecipeGroup(){recipeMode='new';recipeOldFood='';recipeRows=[{recipe_id:'',food_name:'',material_name:'',required_qty:'',material_type:'',is_active:'TRUE',sort_order:'1',memo:''}];renderRecipeGroupForm();renderRecipeGroupList();}
  function editRecipeGroup(food){recipeMode='edit';recipeOldFood=food;const group=groupRecipes().find(g=>g.food===food);recipeRows=(group?group.rows:[]).map(r=>({recipe_id:r['id']||'',food_name:r['요리명']||food,material_name:r['재료명']||'',required_qty:r['필요수량']||'',material_type:r['재료구분']||'',is_active:r['사용여부']||'TRUE',sort_order:r['정렬']||'',memo:r['비고']||''}));if(!recipeRows.length)recipeRows=[{recipe_id:'',food_name:food,material_name:'',required_qty:'',material_type:'',is_active:'TRUE',sort_order:'1',memo:''}];renderRecipeGroupForm();renderRecipeGroupList();}
  function renderRecipeGroupForm(){
    const form=document.getElementById('settingsForm');const title=document.getElementById('settingsEditorTitle');if(!form)return;if(title)title.textContent='레시피';
    const foodName=recipeRows[0]?.food_name||recipeOldFood||'';
    setEditorState(recipeMode, false);
    form.innerHTML=`<div class="recipe-group-editor-v39">
      <div class="recipe-group-top-v39"><div class="settings-field-v36"><label>요리명</label><input id="recipeGroupFoodV39" value="${h(foodName)}" placeholder="예: 가지볶음"></div><button class="btn ghost" id="recipeAddLineV39" type="button">재료 추가</button></div>
      <div class="recipe-edit-table-v39" id="recipeEditRowsV39"></div>
      <div class="recipe-mode-note-v39">레시피는 요리 1개 기준으로 묶어서 관리합니다. 저장 시 재료 줄별로 시트에 반영됩니다.</div>
    </div>`;
    renderRecipeEditRows();
    document.getElementById('recipeGroupFoodV39')?.addEventListener('input',()=>{setEditorState(recipeMode,true);});
    document.getElementById('recipeAddLineV39')?.addEventListener('click',()=>{recipeRows.push({recipe_id:'',food_name:foodName,material_name:'',required_qty:'',material_type:'',is_active:'TRUE',sort_order:String(recipeRows.length+1),memo:''});renderRecipeEditRows();setEditorState(recipeMode,true);});
  }
  function renderRecipeEditRows(){
    const box=document.getElementById('recipeEditRowsV39');if(!box)return;
    box.innerHTML=recipeRows.map((r,i)=>`<div class="recipe-edit-row-v39" data-row="${i}"><input data-rfield="material_name" value="${h(r.material_name||'')}" placeholder="재료명"><input data-rfield="required_qty" type="number" value="${h(r.required_qty||'')}" placeholder="수량"><input data-rfield="material_type" value="${h(r.material_type||'')}" placeholder="구분"><button class="btn bad" data-rdel="${i}" type="button">×</button></div>`).join('');
    box.querySelectorAll('[data-rfield]').forEach(el=>el.addEventListener('input',()=>{const row=Number(el.closest('[data-row]').dataset.row);recipeRows[row][el.dataset.rfield]=String(el.value||'').trim();setEditorState(recipeMode,true);}));
    box.querySelectorAll('[data-rdel]').forEach(btn=>btn.addEventListener('click',()=>{if(recipeRows.length<=1){toast('최소 1개 재료는 필요합니다');return;}recipeRows.splice(Number(btn.dataset.rdel),1);renderRecipeEditRows();setEditorState(recipeMode,true);}));
  }
  function renderRecipeGroupList(){
    const list=document.getElementById('settingsList');if(!list)return;const q=String(document.getElementById('settingsSearch')?.value||'').toLowerCase();
    const groups=groupRecipes().filter(g=>(g.food+' '+g.rows.map(r=>(r['재료명']||'')).join(' ')).toLowerCase().includes(q));
    if(!groups.length){list.innerHTML='<div class="empty">표시할 레시피가 없습니다.</div>';return;}
    list.innerHTML=groups.map((g,i)=>{const detail=expandedFood===g.food?`<div class="recipe-group-detail-v39">${g.rows.map(r=>`<div class="recipe-group-line-v39"><span>${h(r['재료명'])}</span><b>${h(r['필요수량'])}</b></div>`).join('')}</div>`:'';return `<div class="settings-row-v36 ${recipeMode==='edit'&&recipeOldFood===g.food?'is-selected':''}"><div class="settings-row-main-v36"><div class="settings-row-title-v36">${h(g.food)}</div><div class="settings-row-meta-v36">재료 ${g.rows.length}개 · ${h(g.rows.map(r=>r['재료명']).filter(Boolean).join(' / '))}</div>${detail}</div><div class="settings-row-actions-v36"><button class="btn ghost" data-rview="${i}" type="button">보기</button><button class="btn ghost" data-redit="${i}" type="button">수정</button></div></div>`;}).join('');
    list.querySelectorAll('[data-rview]').forEach(btn=>btn.addEventListener('click',()=>{const g=groups[Number(btn.dataset.rview)];expandedFood=expandedFood===g.food?'':g.food;renderRecipeGroupList();}));
    list.querySelectorAll('[data-redit]').forEach(btn=>btn.addEventListener('click',()=>{const g=groups[Number(btn.dataset.redit)];expandedFood=g.food;editRecipeGroup(g.food);}));
  }
  function renderRecipeSettings(){document.querySelectorAll('#settingsTabs .tab').forEach(b=>b.classList.toggle('active',b.dataset.manage==='recipes'));if(!recipeRows.length)blankRecipeGroup();else renderRecipeGroupForm();renderRecipeGroupList();}
  async function saveRecipeGroup(){
    const food=String(document.getElementById('recipeGroupFoodV39')?.value||'').trim();if(!food){toast('요리명을 입력하세요');return;}
    const rows=recipeRows.map((r,i)=>({recipe_id:r.recipe_id||'',food_name:food,material_name:String(r.material_name||'').trim(),required_qty:String(r.required_qty||'').trim(),material_type:String(r.material_type||'').trim(),is_active:'TRUE',sort_order:String(i+1),memo:String(r.memo||'').trim()})).filter(r=>r.material_name&&r.required_qty);
    if(!rows.length){toast('저장할 재료가 없습니다');return;}
    if(!confirm((recipeMode==='edit'?'레시피를 수정':'레시피를 추가')+'하여 Google Sheet에 저장할까요?'))return;
    try{
      setBusy(true,'레시피 저장 중');
      const oldIds=new Set();
      if(recipeMode==='edit'&&recipeOldFood){(DB.recipes||[]).filter(r=>String(r['요리명']||'').trim()===recipeOldFood).forEach(r=>oldIds.add(String(r['id']||'')));}
      let newSeq=1;
      const savedIds=new Set();
      for(const rec of rows){if(!rec.recipe_id)rec.recipe_id=nextRecipeId(newSeq++);savedIds.add(rec.recipe_id);const payload=await apiJsonp('saveRecord',{kind:'recipes',payload:JSON.stringify(rec)});if(!payload||!payload.ok)throw new Error(payload&&payload.error?payload.error:'저장 실패');}
      for(const id of oldIds){if(id&&!savedIds.has(id)){const payload=await apiJsonp('deleteRecord',{kind:'recipes',id});if(!payload||!payload.ok)throw new Error(payload&&payload.error?payload.error:'기존 줄 미사용 처리 실패');}}
      await reloadAll('레시피 저장 완료');
      recipeMode='edit';recipeOldFood=food;recipeRows=[];editRecipeGroup(food);
      setBusy(false);
    }catch(e){console.error(e);setBusy(false);toast('저장 실패: '+e.message);}
  }
  async function disableRecipeGroup(){
    if(recipeMode!=='edit'||!recipeOldFood){toast('미사용 처리할 레시피를 선택하세요');return;}
    if(!confirm(recipeOldFood+' 레시피 전체를 미사용 처리할까요?'))return;
    try{setBusy(true,'미사용 처리 중');const ids=(DB.recipes||[]).filter(r=>String(r['요리명']||'').trim()===recipeOldFood).map(r=>String(r['id']||'')).filter(Boolean);for(const id of ids){const payload=await apiJsonp('deleteRecord',{kind:'recipes',id});if(!payload||!payload.ok)throw new Error(payload&&payload.error?payload.error:'처리 실패');}recipeRows=[];recipeMode='new';recipeOldFood='';await reloadAll('미사용 처리 완료');setBusy(false);}catch(e){console.error(e);setBusy(false);toast('처리 실패: '+e.message);}
  }
  document.addEventListener('click',function(e){
    const tab=e.target.closest('#settingsTabs .tab');
    if(tab){setTimeout(()=>{normalizeCommon();if(activeKind()==='recipes'){recipeRows=[];recipeMode='new';recipeOldFood='';expandedFood='';renderRecipeSettings();}},30);return;}
    if(e.target.closest('#settingsNewBtn')){setTimeout(()=>{if(activeKind()==='recipes')blankRecipeGroup();else normalizeCommon();},30);return;}
    if(e.target.closest('#settingsSaveBtn')&&activeKind()==='recipes'){e.preventDefault();e.stopImmediatePropagation();saveRecipeGroup();return;}
    if(e.target.closest('#settingsDisableBtn')&&activeKind()==='recipes'){e.preventDefault();e.stopImmediatePropagation();disableRecipeGroup();return;}
    if(e.target.closest('#settingsReloadBtn')){setTimeout(()=>{normalizeCommon();if(activeKind()==='recipes')renderRecipeSettings();},150);return;}
    if(e.target.closest('[data-edit-idx]')){setTimeout(normalizeCommon,30);}
  },true);
  document.addEventListener('input',function(e){if(e.target.closest('#settingsSearch')&&activeKind()==='recipes'){renderRecipeGroupList();}else if(e.target.closest('#settingsForm')){setEditorState(activeKind()==='recipes'?recipeMode:'edit',true);}},true);
  document.addEventListener('change',function(e){if(e.target.closest('#settingsForm'))setEditorState(activeKind()==='recipes'?recipeMode:'edit',true);},true);
  const oldRender=window.render;
  if(typeof oldRender==='function'){
    window.render=function(){const out=oldRender.apply(this,arguments);setTimeout(()=>{normalizeCommon();if(activeKind()==='recipes')renderRecipeGroupList();},0);return out;};
  }
  function boot(){normalizeCommon();if(activeKind()==='recipes')renderRecipeSettings();window.axeCookV39Debug=()=>({version:VERSION_V39,kind:activeKind(),recipeMode,recipeOldFood,gasChangeRequired:false});}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',()=>setTimeout(boot,60));else setTimeout(boot,60);
})();
</script>

  function mount(){const view=qs('#viewSettings');if(!view)return;view.innerHTML=`<section class="panel page-panel settings-page-panel"><div id="settingsRootV44"><div class="page-head-v23"><div><div class="panel-title no-margin">설정 <small>관리 기능 안정화 영역</small></div><div class="page-desc-v23">요리·재료·레시피·가공·판매 관련 데이터를 보기/수정으로 분리해 관리합니다.</div></div><span class="pill ok">관리자 모드 예정</span></div><div class="settings-tabs-v44">${cats.map(([k,l])=>`<button class="settings-tab-v44 ${k===current?'active':''}" data-cat="${k}" type="button">${l}</button>`).join('')}</div><div class="settings-work-v44"><div class="settings-box-v44"><div class="settings-box-head-v44"><div class="settings-box-title-v44"><span id="editorTitleV44"></span><span id="modeBadgeV44" class="settings-mode-v44"></span></div><button class="btn ghost" id="newBtnV44" type="button">추가</button></div><div id="formV44" class="settings-form-v44"></div><div class="settings-actions-v44"><button class="btn primary" id="saveBtnV44" type="button">시트 저장</button><button class="btn bad" id="disableBtnV44" type="button">미사용 처리</button></div></div><div class="settings-box-v44"><div class="settings-search-row-v44"><input id="settingsSearchV44" class="input" placeholder="현재 관리 항목 검색" autocomplete="off"><button class="btn ghost" id="reloadBtnV44" type="button">시트 새로고침</button></div><div id="listV44" class="settings-list-v44"></div></div></div></div></section>`;bind();renderAll();}
  function setMode(m,d=false){mode=m;dirty=d;const b=qs('#modeBadgeV44');if(b){b.className='settings-mode-v44 '+(dirty?'dirty':mode==='edit'?'edit':'');b.textContent=dirty?'미저장':mode==='edit'?'수정중':'새 항목';}}
  function renderForm(){const c=cfg[current], title=qs('#editorTitleV44'), form=qs('#formV44');if(title)title.textContent=c.label;if(!form)return;setMode(mode,dirty);if(c.group){renderGroupForm();return;}if(!selected)selected=blankRecord(current);form.innerHTML=(c.fields||[]).map(([api,ko,label,type])=>fieldHtml(api,label,type,selected[api]||'')).join('');qsa('[data-v44-field]',form).forEach(el=>el.addEventListener('input',()=>{selected[el.dataset.v44Field]=el.value;setMode(mode,true);}));}
  function fieldHtml(api,label,type,val){const full=(type==='textarea'||api==='effect'||api==='memo')?' full':'';if(String(type).startsWith('select:')){const opts=type.slice(7).split('|');return `<div class="field-v44${full}"><label>${esc(label)}</label><select data-v44-field="${esc(api)}">${opts.map(o=>`<option value="${esc(o)}" ${txt(val)===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;}if(type==='textarea')return `<div class="field-v44 full"><label>${esc(label)}</label><textarea data-v44-field="${esc(api)}">${esc(val)}</textarea></div>`;return `<div class="field-v44${full}"><label>${esc(label)}</label><input data-v44-field="${esc(api)}" type="${type==='number'?'number':'text'}" value="${esc(val)}"></div>`;}
  function blankRecord(k){const c=cfg[k], o={__id:'',sort_order:String(maxSort(c.rows()))};(c.fields||[]).forEach(([api])=>o[api]='');if(o.is_active!==undefined||c.fields.some(f=>f[0]==='is_active'))o.is_active='TRUE';if(o.is_primary!==undefined||c.fields.some(f=>f[0]==='is_primary'))o.is_primary='TRUE';return o;}
  function renderGroupForm(){const c=cfg[current], form=qs('#formV44'), st=state[current];if(!st.rows.length)st.rows=[blankLine(current)];form.innerHTML=`<div class="field-v44 full"><label>${current==='recipes'?'요리명':'가공재료명'}</label><input id="groupKeyV44" value="${esc(st.key)}" placeholder="${current==='recipes'?'예: 가지볶음':'예: 튀김옷'}"></div><div class="line-editor-v44"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><label style="font-size:11px;color:var(--muted);font-weight:950">구성 재료</label><button class="btn ghost" id="addLineV44" type="button">재료 추가</button></div><div id="lineRowsV44"></div></div>`;renderLineRows();qs('#groupKeyV44')?.addEventListener('input',e=>{st.key=e.target.value;setMode(mode,true);});qs('#addLineV44')?.addEventListener('click',()=>{st.rows.push(blankLine(current));renderLineRows();setMode(mode,true);});}
  function blankLine(k){return {__id:'',name:'',qty:'',extra:'',time:'',memo:''};}
  function dbToLine(k,r){const c=cfg[k];return {__id:txt(r[c.id]),name:txt(r[c.lineName]),qty:txt(r[c.lineQty]),extra:c.lineExtra?txt(r[c.lineExtra]):'',time:c.lineTime?txt(r[c.lineTime]):'',memo:txt(r['비고'])};}
  function renderLineRows(){const c=cfg[current], st=state[current], box=qs('#lineRowsV44');if(!box)return;box.innerHTML=st.rows.map((r,i)=>`<div class="line-row-v44" data-line="${i}"><input data-line-field="name" value="${esc(r.name)}" placeholder="${current==='recipes'?'재료명':'하위재료명'}"><input data-line-field="qty" type="number" value="${esc(r.qty)}" placeholder="수량"><input data-line-field="extra" value="${esc(r.extra)}" placeholder="${current==='recipes'?'구분':'결과수량'}"><input data-line-field="time" value="${esc(r.time)}" placeholder="가공시간" class="${current==='recipes'?'hidden-v44':''}"><button class="btn bad" data-line-del="${i}" type="button">×</button></div>`).join('');qsa('[data-line-field]',box).forEach(el=>el.addEventListener('input',()=>{const i=Number(el.closest('[data-line]').dataset.line);st.rows[i][el.dataset.lineField]=el.value;setMode(mode,true);}));qsa('[data-line-del]',box).forEach(btn=>btn.addEventListener('click',()=>{if(st.rows.length<=1){toast('최소 1개 재료는 필요합니다');return;}st.rows.splice(Number(btn.dataset.lineDel),1);renderLineRows();setMode(mode,true);}));}
  function renderList(){const box=qs('#listV44');if(!box)return;const list=filteredList();if(!list.length){box.innerHTML='<div class="empty-v44">표시할 항목이 없습니다.</div>';return;}box.innerHTML=list.map((item,i)=>cfg[current].group?groupRowHtml(item,i):singleRowHtml(item,i)).join('');}
  function singleRowHtml(r,i){const c=cfg[current], key=current+'::'+txt(c.id==='입력명'?r['입력명']:r[c.id]||c.title(r));const detail=expanded===key?detailSingle(r):'';return `<div class="row-v44 ${selected&&txt(selected.__id)===txt(r[c.id])&&mode==='edit'?'selected':''}" data-key="${esc(key)}" data-idx="${i}"><div class="row-title-v44">${esc(c.title(r)||'-')}</div><div class="row-actions-v44"><button class="btn ghost" data-act="view" type="button">보기</button><button class="btn ghost" data-act="edit" type="button">수정</button></div>${detail}</div>`;}
  function groupRowHtml(g,i){const key=current+'::'+g.key;const detail=expanded===key?detailGroup(g):'';return `<div class="row-v44 ${state[current].key===g.key&&mode==='edit'?'selected':''}" data-key="${esc(key)}" data-idx="${i}"><div class="row-title-v44">${esc(g.key)}</div><div class="row-actions-v44"><button class="btn ghost" data-act="view" type="button">보기</button><button class="btn ghost" data-act="edit" type="button">수정</button></div>${detail}</div>`;}
  function detailSingle(r){
    if(current==='foods'){
      const name=txt(r['요리명'])||'-';
      const grade=txt(r['등급'])||'-';
      const setQty=txt(r['1세트수량'])||'-';
      const sale=txt(r['세트판매가'])||'-';
      const effect=txt(r['효과'])||'-';
      const effectTime=txt(r['지속시간'])||'-';
      const cookTime=txt(r['조리시간']||r['중간수치'])||'-';
      const active=txt(r['사용여부'])||'TRUE';
      const memo=txt(r['비고'])||'';
      return `<div class="detail-v44 food-detail-v46">
        <div class="food-head-v46">
          <div class="food-name-v46">${esc(name)}</div>
          <span class="food-grade-v46">${esc(grade)}</span>
        </div>
        <div class="food-stat-grid-v46">
          <div class="food-stat-v46"><span>1세트</span><b>${esc(setQty)}</b></div>
          <div class="food-stat-v46"><span>판매가</span><b>${esc(sale)}</b></div>
          <div class="food-stat-v46"><span>지속</span><b>${esc(effectTime)}</b></div>
          <div class="food-stat-v46"><span>조리</span><b>${esc(cookTime)}</b></div>
        </div>
        <div class="food-effect-v46"><span>효과</span><b>${esc(effect)}</b></div>
        <div class="food-foot-v46">
          <span>사용여부 <b>${esc(active)}</b></span>
          ${memo?`<span>비고 <b>${esc(memo)}</b></span>`:''}
        </div>
      </div>`;
    }
    const c=cfg[current];const fullLabels=new Set(['효과','비고']);return `<div class="detail-v44"><div class="detail-grid-v44">${c.view.map(([label,field])=>{const v=txt(r[field]);const full=fullLabels.has(label)||String(v).length>26;return `<div class="detail-line-v44 ${full?'full-v45':''}"><span class="detail-label-v44">${esc(label)}</span><span class="detail-value-v44 ${v?'':'empty'}">${esc(v||'-')}</span></div>`;}).join('')}</div></div>`;}
  function detailGroup(g){const c=cfg[current];const isProcess=current==='processes';const times=[...new Set(g.rows.map(r=>txt(r[c.lineTime])).filter(Boolean))];const timeText=isProcess?(times.length===1?times[0]:(times.length?times.join(' / '):'')):'';const chips=g.rows.map(r=>{const extra=c.lineExtra?txt(r[c.lineExtra]):'';const extraText=isProcess?(extra?`결과 ${extra}`:''):(extra||'');return `<span class="group-chip-v44"><span title="${esc(r[c.lineName]||'-')}">${esc(r[c.lineName]||'-')}</span><b>${esc(r[c.lineQty]||'-')}</b>${extraText?`<small>${esc(extraText)}</small>`:''}</span>`;}).join('');return `<div class="detail-v44">${isProcess?`<div class="detail-note-v45"><span>가공 구성</span>${timeText?`<span class="detail-time-v45">가공시간 ${esc(timeText)}</span>`:''}</div>`:''}<div class="group-lines-v44">${chips}</div></div>`;}
  function renderAll(){qsa('#settingsRootV44 .settings-tab-v44').forEach(b=>b.classList.toggle('active',b.dataset.cat===current));expanded='';if(cfg[current].group){state[current].key='';state[current].rows=[blankLine(current)];}else selected=blankRecord(current);mode='new';dirty=false;renderForm();renderList();}
  function bind(){const root=qs('#settingsRootV44');root.addEventListener('click',async e=>{const tab=e.target.closest('[data-cat]');if(tab){current=tab.dataset.cat;renderAll();return;}if(e.target.closest('#newBtnV44')){if(cfg[current].group){state[current].key='';state[current].rows=[blankLine(current)];}else selected=blankRecord(current);mode='new';dirty=false;renderForm();renderList();return;}if(e.target.closest('#reloadBtnV44')){await reload();return;}if(e.target.closest('#saveBtnV44')){await save();return;}if(e.target.closest('#disableBtnV44')){await disable();return;}const act=e.target.closest('[data-act]');if(act){const row=act.closest('[data-idx]'), idx=Number(row.dataset.idx), list=filteredList();if(act.dataset.act==='view'){expanded=expanded===row.dataset.key?'':row.dataset.key;renderList();return;}if(act.dataset.act==='edit'){expanded=row.dataset.key;if(cfg[current].group){const g=list[idx];state[current].key=g.key;state[current].rows=g.rows.map(r=>dbToLine(current,r));}else{selected=fromDbRecord(current,list[idx]);}mode='edit';dirty=false;renderForm();renderList();return;}}});qs('#settingsSearchV44')?.addEventListener('input',()=>{expanded='';renderList();});}
  async function reload(){try{setBusy(true,'시트 새로고침 중');await loadSheetRawBeforeBoot();initDB();render();mount();toast('시트 새로고침 완료');}catch(e){toast('새로고침 실패: '+e.message);}finally{setBusy(false);}}
  async function save(){if(busy)return;try{if(cfg[current].group)await saveGroup();else await saveSingle();}catch(e){console.error(e);toast('저장 실패: '+e.message);} }
  async function saveSingle(){const c=cfg[current];qsa('#formV44 [data-v44-field]').forEach(el=>selected[el.dataset.v44Field]=el.value);if(current==='aliases'&&!txt(selected.alias_name)){toast('입력명을 입력하세요');return;}if(current!=='aliases'&&!txt(selected[c.fields[0][0]])){toast(c.fields[0][2]+'을 입력하세요');return;}const payload=toApiRecord(current,selected);if(!payload[c.apiId])payload[c.apiId]=selected.__id||nextId(c);if(!confirm((mode==='edit'?'수정':'추가')+' 내용을 시트에 저장할까요?'))return;setBusy(true,'시트 저장 중');const res=await api('saveRecord',{kind:current,payload:JSON.stringify(payload)});if(!res||!res.ok)throw new Error(res&&res.error?res.error:'저장 실패');await reloadAfterSave('시트 저장 완료');}
  async function saveGroup(){const c=cfg[current], st=state[current], key=txt(qs('#groupKeyV44')?.value);if(!key){toast(current==='recipes'?'요리명을 입력하세요':'가공재료명을 입력하세요');return;}const rows=st.rows.map((r,i)=>Object.assign({},r,{name:txt(r.name),qty:txt(r.qty),extra:txt(r.extra),time:txt(r.time),sort_order:String(i+1)})).filter(r=>r.name&&r.qty);if(!rows.length){toast('저장할 재료가 없습니다');return;}if(!confirm((mode==='edit'?'수정':'추가')+' 내용을 시트에 저장할까요?'))return;setBusy(true,'시트 저장 중');const oldIds=new Set();if(mode==='edit'&&st.key){groups(current).find(g=>g.key===st.key)?.rows.forEach(r=>{const id=txt(r[c.id]);if(id)oldIds.add(id);});}const savedIds=new Set();for(const r of rows){const payload={};payload[c.apiId]=r.__id||'';payload[c.groupApi]=key;payload[c.apiMap.name]=r.name;payload[c.apiMap.qty]=r.qty;payload[c.apiMap.extra]=r.extra; if(c.apiMap.time)payload[c.apiMap.time]=r.time; payload.is_active='TRUE';payload.sort_order=r.sort_order;payload.memo=r.memo||'';const res=await api('saveRecord',{kind:current,payload:JSON.stringify(payload)});if(!res||!res.ok)throw new Error(res&&res.error?res.error:'저장 실패');savedIds.add(res.id||payload[c.apiId]);}

<script id="axeCookV54ProcessPatch">
(function(){
  function patchProcessCard(){
    const panel=document.querySelector('#viewHome .recipe-work-panel');
    const proc=document.getElementById('processInline');
    if(!panel||!proc)return;
    panel.classList.add('has-process-v30','has-process-v31');
    panel.classList.remove('no-process-v30','no-process-v31');
    if(!proc.innerHTML.trim()){
      proc.innerHTML='<div class="process-side-card-v30 axe-process-empty-v54"><div class="process-side-title-v30"><span>가공 레시피</span><small>준비 현황</small></div><div class="empty process-empty-v54">등록된 가공 레시피가 없습니다.</div></div>';
    }else{
      const title=proc.querySelector('.process-side-title-v30 span');
      if(title) title.textContent='가공 레시피';
    }
  }
  function wrap(fnName){
    const old=window[fnName];
    if(typeof old!=='function')return;
    window[fnName]=function(){
      const out=old.apply(this,arguments);
      setTimeout(patchProcessCard,0);
      return out;
    };
  }
  function init(){
    wrap('renderResultsOnly');
    wrap('render');
    patchProcessCard();
    setTimeout(patchProcessCard,400);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>

<script id="axeCookV58FinalScript">
(function(){
  function renderProcessCompactV58(r){
    const procInline=document.getElementById('processInline');
    const panel=document.querySelector('.recipe-work-panel');
    if(!procInline||!panel)return;
    panel.classList.add('has-process-v30','has-process-v31');
    panel.classList.remove('no-process-v30','no-process-v31');
    if(!r.proc.length){
      procInline.innerHTML='<div class="process-empty-v58 axe-process-empty-v58">등록된 가공 레시피가 없습니다.</div>';
      return;
    }
    procInline.innerHTML='<div class="process-side-card-v30"><div class="process-side-list-v30">'+r.proc.map(function(p){
      const time=(p.rows&&p.rows[0])?h(text(p.rows[0]['가공시간'])||'미확인'):'미확인';
      const mats=(p.rows||[]).map(function(x){return h(text(x['하위재료명']))+' '+h(text(x['필요수량'])||'');}).join(' · ') || '하위재료 미등록';
      return '<div class="process-side-row-v30 process-row-v58"><div><b>'+h(p.name)+' <span style="color:var(--gold2)">'+time+'</span></b><small>'+mats+'</small></div><span class="process-side-batch-v30 process-batch-v58">'+h(p.batch)+'회</span></div>';
    }).join('')+'</div></div>';
  }
  function renderResultsOnlyV58(){
    const r=calc();
    const summary=document.getElementById('summaryGrid');
    if(summary){summary.innerHTML='<div class="summary primary"><div class="summary-label">총 세트</div><div class="summary-value gold">'+r.totalSets+'</div></div><div class="summary"><div class="summary-label">인벤 예상</div><div class="summary-value">'+h(invText(r.totalSets))+'</div></div><div class="summary"><div class="summary-label">구매 원가</div><div class="summary-value ok">'+r.totalCost.toLocaleString()+'</div></div><div class="summary"><div class="summary-label">예상 수익</div><div class="summary-value '+(r.profit>=0?'gold':'bad')+'">'+r.profit.toLocaleString()+'</div></div>';}
    const warning=document.getElementById('warningBox');
    if(warning){warning.innerHTML=r.unknownRows.length?'<div class="warning">가격 또는 획득처가 없는 재료: '+r.unknownRows.map(function(x){return h(x.name)+' '+x.qty+'개';}).join(', ')+'</div>':'';}
    const purchase=document.getElementById('purchaseList');
    const rows=[].concat(r.purchases.map(function(p){return Object.assign({},p,{type:'buy'});}),r.farmRows.map(function(x){return {name:x.name,qty:x.qty,bundleQty:0,bundlePrice:0,bundles:'채집',cost:0,where:'농장',type:'farm'};}));
    if(purchase){
      if(!rows.length) purchase.innerHTML='<div class="empty">필요한 구매 재료가 없습니다.</div>';
      else purchase.innerHTML=rows.map(function(p){
        const key=checkKey(p.type+'_'+p.name); const done=checks[key]; const isFarm=p.type==='farm';
        const remain=(!isFarm)?Math.max(0,(p.bundles*p.bundleQty)-p.qty):0;
        const sub=isFarm?'채집 · 필요 '+p.qty+'개':h(p.where)+' · 필요 '+p.qty+'개 · 구매 '+(p.bundles*p.bundleQty)+'개 · '+remain+'개 남음';
        return '<label class="check-row '+(done?'done':'')+' '+(isFarm?'farm-row':'')+'"><input type="checkbox" '+(done?'checked':'')+' data-check="'+h(key)+'"><div><div class="check-name">'+h(p.name)+(isFarm?'<span class="mini-badge farm-badge">농장</span>':'')+'</div><div class="check-sub">'+sub+'</div></div><div class="check-right">'+(isFarm?'':'<span class="check-cost">'+num(p.cost,0).toLocaleString()+'원</span>')+'<span class="check-bundle '+(isFarm?'farm-pack':'')+'">'+(isFarm?'채집':p.bundles+'묶음')+'</span></div></label>';
      }).join('');
      purchase.querySelectorAll('[data-check]').forEach(function(i){i.addEventListener('change',function(){checks[i.dataset.check]=i.checked;saveState();i.closest('.check-row').classList.toggle('done',i.checked);});});
    }
    renderProcessCompactV58(r);
    const farmCount=document.getElementById('farmCount'); if(farmCount) farmCount.textContent=r.farmRows.length;
    const processCount=document.getElementById('processCount'); if(processCount) processCount.textContent=r.proc.length;
    const fishCount=document.getElementById('fishCount'); if(fishCount) fishCount.textContent=r.fishNeed.length;
    renderWorkRecipes();
  }
  function install(){
    window.renderResultsOnly=renderResultsOnlyV58;
    try{ renderResultsOnly=renderResultsOnlyV58; }catch(e){}
    setTimeout(function(){ try{renderResultsOnlyV58();}catch(e){} },0);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',install);else install();
})();
</script>

<script id="axeCookV61EmptyStateTrueFixScript">
(function(){
  function renderWorkRecipesV61(){
    const box=document.getElementById('recipeWorkList');
    if(!box)return;
    if(!orders.length){
      box.innerHTML='<div class="axe-empty-message-v61">음식을 추가하면 기본 레시피와 조리시간이 표시됩니다.</div>';
      return;
    }
    box.innerHTML=orders.map(function(o){
      const f=getFood(o.name); if(!f)return '';
      const rows=getFoodRecipes(o.name);
      const matText=rows.length?rows.map(function(r){return '<span class="recipe-v13-mat"><span>'+h(r['재료명'])+'</span> <b>'+num(r['필요수량'],0)+'</b></span>';}).join('<span class="recipe-v13-dot">·</span>'):'<span class="recipe-v13-empty">레시피 미등록</span>';
      const plain=rows.length?rows.map(function(r){return text(r['재료명'])+' '+num(r['필요수량'],0);}).join(' · '):'레시피 미등록';
      return '<div class="recipe-work-card recipe-v13-card"><div class="recipe-v13-head"><span class="recipe-v13-bracket">[</span><span class="recipe-v13-name">'+h(o.name)+'</span><span class="recipe-v13-sep">/</span><span class="recipe-v13-time">'+h(getCookTime(f))+'</span><span class="recipe-v13-bracket">]</span></div><div class="recipe-v13-mats" title="'+h(plain)+'">'+matText+'</div></div>';
    }).join('');
  }
  function renderProcessCompactV61(r){
    const procInline=document.getElementById('processInline');
    const panel=document.querySelector('.recipe-work-panel');
    if(!procInline||!panel)return;
    panel.classList.add('has-process-v30','has-process-v31');
    panel.classList.remove('no-process-v30','no-process-v31');
    if(!r.proc.length){
      procInline.innerHTML='<div class="axe-empty-message-v61">등록된 가공 레시피가 없습니다.</div>';
      return;
    }
    procInline.innerHTML='<div class="process-side-card-v30"><div class="process-side-list-v30">'+r.proc.map(function(p){
      const time=(p.rows&&p.rows[0])?h(text(p.rows[0]['가공시간'])||'미확인'):'미확인';
      const mats=(p.rows||[]).map(function(x){return h(text(x['하위재료명']))+' '+h(text(x['필요수량'])||'');}).join(' · ') || '하위재료 미등록';
      return '<div class="process-side-row-v30 process-row-v58"><div><b>'+h(p.name)+' <span style="color:var(--gold2)">'+time+'</span></b><small>'+mats+'</small></div><span class="process-side-batch-v30 process-batch-v58">'+h(p.batch)+'회</span></div>';
    }).join('')+'</div></div>';
  }
  function renderResultsOnlyV61(){
    const r=calc();
    const summary=document.getElementById('summaryGrid');
    if(summary){summary.innerHTML='<div class="summary primary"><div class="summary-label">총 세트</div><div class="summary-value gold">'+r.totalSets+'</div></div><div class="summary"><div class="summary-label">인벤 예상</div><div class="summary-value">'+h(invText(r.totalSets))+'</div></div><div class="summary"><div class="summary-label">구매 원가</div><div class="summary-value ok">'+r.totalCost.toLocaleString()+'</div></div><div class="summary"><div class="summary-label">예상 수익</div><div class="summary-value '+(r.profit>=0?'gold':'bad')+'">'+r.profit.toLocaleString()+'</div></div>';}
    const warning=document.getElementById('warningBox');
    if(warning){warning.innerHTML=r.unknownRows.length?'<div class="warning">가격 또는 획득처가 없는 재료: '+r.unknownRows.map(function(x){return h(x.name)+' '+x.qty+'개';}).join(', ')+'</div>':'';}
    const purchase=document.getElementById('purchaseList');
    const rows=[].concat(r.purchases.map(function(p){return Object.assign({},p,{type:'buy'});}),r.farmRows.map(function(x){return {name:x.name,qty:x.qty,bundleQty:0,bundlePrice:0,bundles:'채집',cost:0,where:'농장',type:'farm'};}));
    if(purchase){
      if(!rows.length) purchase.innerHTML='<div class="axe-empty-message-v61">필요한 구매 재료가 없습니다.</div>';
      else purchase.innerHTML=rows.map(function(p){
        const key=checkKey(p.type+'_'+p.name); const done=checks[key]; const isFarm=p.type==='farm';
        const remain=(!isFarm)?Math.max(0,(p.bundles*p.bundleQty)-p.qty):0;
        const sub=isFarm?'채집 · 필요 '+p.qty+'개':h(p.where)+' · 필요 '+p.qty+'개 · 구매 '+(p.bundles*p.bundleQty)+'개 · '+remain+'개 남음';
        return '<label class="check-row '+(done?'done':'')+' '+(isFarm?'farm-row':'')+'"><input type="checkbox" '+(done?'checked':'')+' data-check="'+h(key)+'"><div><div class="check-name">'+h(p.name)+(isFarm?'<span class="mini-badge farm-badge">농장</span>':'')+'</div><div class="check-sub">'+sub+'</div></div><div class="check-right">'+(isFarm?'':'<span class="check-cost">'+num(p.cost,0).toLocaleString()+'원</span>')+'<span class="check-bundle '+(isFarm?'farm-pack':'')+'">'+(isFarm?'채집':p.bundles+'묶음')+'</span></div></label>';
      }).join('');
      purchase.querySelectorAll('[data-check]').forEach(function(i){i.addEventListener('change',function(){checks[i.dataset.check]=i.checked;saveState();i.closest('.check-row').classList.toggle('done',i.checked);});});
    }
    renderProcessCompactV61(r);
    const farmCount=document.getElementById('farmCount'); if(farmCount) farmCount.textContent=r.farmRows.length;
    const processCount=document.getElementById('processCount'); if(processCount) processCount.textContent=r.proc.length;
    const fishCount=document.getElementById('fishCount'); if(fishCount) fishCount.textContent=r.fishNeed.length;
    renderWorkRecipesV61();
  }
  function install(){
    window.renderWorkRecipes=renderWorkRecipesV61; try{renderWorkRecipes=renderWorkRecipesV61;}catch(e){}
    window.renderResultsOnly=renderResultsOnlyV61; try{renderResultsOnly=renderResultsOnlyV61;}catch(e){}
    setTimeout(function(){try{renderResultsOnlyV61();}catch(e){}},0);
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',install);else install();
})();
</script>
